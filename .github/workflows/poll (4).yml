name: Patreon Slot Watcher

on:
  schedule:
    # Runs every 30 minutes
    # Note: GitHub's scheduler has ~1-2 min jitter and may skip runs under heavy load.
    - cron: "*/30 * * * *"
  workflow_dispatch:
    # Allows manual trigger from the Actions tab for testing

jobs:
  check-slots:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests lxml

      - name: Run slot checker
        run: python check_slots.py
